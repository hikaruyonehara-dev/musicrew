# ============================================================
# Production overrides — loaded when SPRING_PROFILES_ACTIVE=prod
#
# Sensitive values come from environment variables. NEVER commit
# real DB credentials or AWS keys to this file.
# ============================================================

# Datasource — placeholders resolved from env vars at startup.
# Set these on the deploy target (Elastic Beanstalk env config).
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# JPA — be conservative in prod.
# `update` works for solo dev; real prod uses Flyway/Liquibase migrations.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Disable the H2 console — no debugging UI exposed in prod.
spring.h2.console.enabled=false

# Don't run data.sql automatically; seed via migrations.
spring.sql.init.mode=never

# Upload dir — used as fallback path on the server, but S3 is the real storage.
musicrew.upload.dir=/var/musicrew/uploads

# S3 — bucket and region come from env vars set on the deploy target.
aws.s3.bucket=${S3_BUCKET}
aws.s3.region=${AWS_REGION}
