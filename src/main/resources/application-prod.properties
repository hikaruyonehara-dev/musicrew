# ============================================================
# Production overrides — loaded when SPRING_PROFILES_ACTIVE=prod
#
# Sensitive values come from environment variables. NEVER commit
# real DB credentials to this file.
# ============================================================

# Datasource — placeholders resolved from env vars at startup.
spring.datasource.url=${DB_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# JPA — be conservative in prod.
# `update` works for solo dev; real prod would use Flyway/Liquibase migrations.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

# Disable the H2 console — no debugging UI exposed in prod.
spring.h2.console.enabled=false

# Don't run data.sql automatically; seed via migrations.
spring.sql.init.mode=never

# Local-disk uploads on the server.
musicrew.upload.dir=/var/musicrew/uploads
