<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: base(title='Messages', content=~{::section})}">

<body>
    <section>

        <!-- Fixed background — empty stadium from the stage, moody arena vibe -->
        <img src="/images/stadium-bg.jpg" alt="" class="fixed inset-0 w-full h-full object-cover -z-10"
            style="object-position: center;" />
        <div class="fixed inset-0 -z-10 bg-neutral-950/65"></div>

        <h1 class="text-3xl font-semibold tracking-tight mb-6">Messages</h1>

        <!-- Filter tabs -->
        <div class="flex gap-2 mb-6 border-b border-neutral-800">
            <a th:href="@{/messages}"
                th:classappend="${activeFilter == 'all'} ? 'border-white text-white' : 'border-transparent text-neutral-400 hover:text-white'"
                class="px-4 py-2 border-b-2 text-sm transition">
                All
            </a>
            <a th:href="@{/messages(filter='favorites')}"
                th:classappend="${activeFilter == 'favorites'} ? 'border-white text-white' : 'border-transparent text-neutral-400 hover:text-white'"
                class="px-4 py-2 border-b-2 text-sm transition">
                ★ Favorites
            </a>
        </div>

        <div th:if="${#lists.isEmpty(conversations)}" class="text-neutral-500 text-center py-12">
            <span th:if="${activeFilter == 'favorites'}">
                No conversations with favorited users yet. Tap ☆ on a profile to add favorites.
            </span>
            <span th:unless="${activeFilter == 'favorites'}">
                You have no conversations yet.
                <a th:href="@{/search}" class="text-blue-400 hover:text-blue-300 transition">Find someone</a>
                to start one.
            </span>
        </div>

        <ul class="space-y-2" th:unless="${#lists.isEmpty(conversations)}">
            <li th:each="c : ${conversations}">
                <a th:href="@{'/messages/' + ${c.id}}"
                    class="flex items-center justify-between bg-neutral-900 border border-neutral-800 hover:border-neutral-700 rounded-xl p-4 transition gap-3">

                    <!-- Avatar with online indicator -->
                    <div class="relative shrink-0">
                        <img th:if="${otherProfiles[c.id].profilePicPath != null}"
                            th:src="${otherProfiles[c.id].profilePicPath}" alt=""
                            class="w-10 h-10 rounded-full object-cover border border-neutral-800" />
                        <div th:unless="${otherProfiles[c.id].profilePicPath != null}"
                            class="w-10 h-10 rounded-full bg-neutral-800 border border-neutral-800 flex items-center justify-center text-xs text-neutral-500">
                            ?
                        </div>
                        <span th:classappend="${otherProfiles[c.id].user.online ? 'bg-emerald-500' : 'bg-neutral-600'}"
                            class="absolute -bottom-0.5 -right-0.5 w-3 h-3 rounded-full border-2 border-neutral-950"></span>
                    </div>

                    <div class="flex-1 min-w-0">
                        <div class="font-medium" th:text="${otherProfiles[c.id].displayName}">Display name</div>
                        <div class="text-sm text-neutral-500"
                            th:text="${T(co.sponto.musicrew.util.RelativeTime).format(lastTimes[c.id])}">
                            2h
                        </div>
                    </div>
                    <span th:if="${unreadCounts[c.id] > 0}"
                        class="bg-white text-black text-xs px-2 py-0.5 rounded-full font-medium ml-3"
                        th:text="${unreadCounts[c.id]}"></span>
                </a>
            </li>

        </ul>
    </section>
</body>

</html>
