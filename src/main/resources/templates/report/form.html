<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: base(title='Report user', content=~{::section})}">

<body>
    <section>
        <div class="max-w-xl mx-auto">
            <div class="mb-6">
                <a th:href="@{'/profile/' + ${reportedProfile.user.id}}"
                    class="text-neutral-400 hover:text-white text-sm transition">
                    &larr; Back to profile
                </a>
            </div>

            <h1 class="text-3xl font-semibold tracking-tight mb-2">Report user</h1>
            <p class="text-neutral-400 mb-8">
                Reporting <span class="text-white" th:text="${reportedProfile.displayName}">user</span>.
                Our team will review your report and take action if needed.
            </p>

            <form th:action="@{'/users/' + ${reportedProfile.user.id} + '/report'}" method="post"
                class="bg-neutral-900 border border-neutral-800 rounded-xl p-6 space-y-5">

                <div>
                    <label class="block text-sm font-medium mb-2">Reason</label>
                    <select name="reason" required
                        class="w-full bg-neutral-950 border border-neutral-800 text-white px-4 py-2.5 rounded-lg focus:outline-none focus:border-neutral-600 transition">
                        <option value="" class="bg-neutral-900 text-white">— Choose one —</option>
                        <option th:each="r : ${reasons}" th:value="${r.name()}" th:text="${r.label()}"
                            class="bg-neutral-900 text-white"></option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium mb-2">
                        Description <span class="text-neutral-500 font-normal">(optional)</span>
                    </label>
                    <textarea name="description" rows="4" maxlength="1000"
                        placeholder="Add any details that would help our team understand the issue."
                        class="w-full bg-neutral-950 border border-neutral-800 text-white px-4 py-2.5 rounded-lg focus:outline-none focus:border-neutral-600 transition resize-none"></textarea>
                </div>

                <div class="flex items-center gap-3 pt-2">
                    <button type="submit"
                        class="bg-white text-black px-5 py-2 rounded-full font-medium hover:bg-neutral-200 transition">
                        Submit report
                    </button>
                    <a th:href="@{'/profile/' + ${reportedProfile.user.id}}"
                        class="text-neutral-400 hover:text-white text-sm transition">
                        Cancel
                    </a>
                </div>
            </form>
        </div>
    </section>
</body>

</html>
