<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: base(title='Favorited users', content=~{::section})}">

<body>
    <section>
        <div class="max-w-2xl mx-auto">
            <div class="mb-6">
                <a th:href="@{/profile/me/edit}" class="text-neutral-400 hover:text-white text-sm transition">
                    &larr; Back to settings
                </a>
            </div>

            <h1 class="text-3xl font-semibold tracking-tight mb-2">Favorited users</h1>
            <p class="text-neutral-400 mb-8">
                Users you've bookmarked for easy access. Private — they're not notified.
            </p>

            <div class="bg-neutral-900 border border-neutral-800 rounded-xl p-6">
                <p th:if="${#lists.isEmpty(myFavorites)}" class="text-neutral-400 text-sm">
                    You haven't favorited anyone yet. Tap ☆ on a profile to bookmark them here.
                </p>

                <ul th:unless="${#lists.isEmpty(myFavorites)}" class="space-y-2">
                    <li th:each="f : ${myFavorites}"
                        class="flex items-center justify-between gap-3 px-4 py-3 rounded-lg bg-neutral-950 border border-neutral-800">

                        <!-- Avatar + name + date -->
                        <a th:href="@{'/profile/' + ${f.favorited.id}}"
                            class="flex items-center gap-3 min-w-0 flex-1 group">

                            <img th:if="${favoriteProfiles[f.favorited.id].profilePicPath != null}"
                                th:src="${favoriteProfiles[f.favorited.id].profilePicPath}" alt=""
                                class="w-10 h-10 rounded-full object-cover border border-neutral-800 shrink-0" />
                            <div th:unless="${favoriteProfiles[f.favorited.id].profilePicPath != null}"
                                class="w-10 h-10 rounded-full bg-neutral-800 border border-neutral-800 flex items-center justify-center text-xs text-neutral-500 shrink-0">
                                ?
                            </div>

                            <div class="min-w-0">
                                <div class="font-medium group-hover:text-neutral-300 transition truncate"
                                    th:text="${favoriteProfiles[f.favorited.id].displayName}">
                                    Display name
                                </div>
                                <div class="text-xs text-neutral-500"
                                    th:text="'Favorited on ' + ${#temporals.format(f.createdAt, 'yyyy-MM-dd')}">
                                    Favorited on 2026-01-01
                                </div>
                            </div>
                        </a>

                        <!-- Unfavorite button -->
                        <form th:action="@{'/users/' + ${f.favorited.id} + '/unfavorite'}" method="post"
                            class="shrink-0">
                            <button type="submit"
                                class="text-sm text-neutral-400 hover:text-white border border-neutral-700 px-3 py-1.5 rounded-full transition">
                                Unfavorite
                            </button>
                        </form>
                    </li>
                </ul>
            </div>
        </div>
    </section>
</body>

</html>
