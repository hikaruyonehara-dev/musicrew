<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: base(title='Log in', content=~{::section})}">

<body>
    <section>

        <!-- Fixed background image — fills viewport, positioned so the right side (pickup) is visible -->
        <img src="/images/guitar-bg.jpg" alt="" class="fixed inset-0 w-full h-full object-cover -z-10"
            style="object-position: 60% center;" />

        <!-- Dark gradient overlay: opaque on left for readability, fades to transparent on right -->
        <div class="fixed inset-0 -z-10
                bg-gradient-to-l from-neutral-950 via-neutral-950/80 to-transparent"></div>

        <!-- Two-column grid: form on left, right column is empty (image bleeds through) -->
        <div class="min-h-[70vh] flex items-center md:justify-end">

            <div class="max-w-sm w-full">
                <h2 class="text-3xl font-semibold tracking-tight mb-2">Welcome back</h2>
                <p class="text-neutral-400 mb-8">Log in to your Musicrew account.</p>

                <div th:if="${param.signedUp}"
                    class="mb-6 px-4 py-3 rounded-lg bg-emerald-950 border border-emerald-800 text-emerald-300 text-sm">
                    Account created. Please log in.
                </div>
                <div th:if="${param.error}"
                    class="mb-6 px-4 py-3 rounded-lg bg-red-950 border border-red-800 text-red-300 text-sm">
                    Invalid email or password.
                </div>

                <form th:action="@{/login}" method="post" class="space-y-5">
                    <div>
                        <label class="block text-sm text-neutral-400 mb-1.5">Email</label>
                        <input type="email" name="username" required
                            class="w-full bg-neutral-900/80 backdrop-blur-sm border border-neutral-800 text-white px-4 py-2.5 rounded-lg focus:outline-none focus:border-neutral-600 transition" />
                    </div>

                    <div>
                        <label class="block text-sm text-neutral-400 mb-1.5">Password</label>
                        <input type="password" name="password" required
                            class="w-full bg-neutral-900/80 backdrop-blur-sm border border-neutral-800 text-white px-4 py-2.5 rounded-lg focus:outline-none focus:border-neutral-600 transition" />
                    </div>

                    <button type="submit"
                        class="w-full bg-white text-black px-6 py-3 rounded-full font-medium hover:bg-neutral-200 transition">
                        Log in
                    </button>
                </form>
            </div>

        </div>
    </section>
</body>

</html>
