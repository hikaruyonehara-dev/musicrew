<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: base(title='Sign up', content=~{::section})}">

<body>
    <section>
        <div class="max-w-md mx-auto">
            <h2 class="text-3xl font-semibold tracking-tight mb-2">Create your account</h2>
            <p class="text-neutral-400 mb-8">Start finding bandmates today.</p>

            <!-- form to input the sign up info -->
            <form th:action="@{/signup}" th:object="${form}" method="post" class="space-y-5">

                <div th:if="${#fields.hasGlobalErrors()}"
                    class="px-4 py-3 rounded-lg bg-red-950 border border-red-800 text-red-300 text-sm">
                    <div th:each="err : ${#fields.globalErrors()}" th:text="${err}"></div>
                </div>

                <div>
                    <label class="block text-sm text-neutral-400 mb-1.5">Display name</label>
                    <input type="text" th:field="*{displayName}"
                        class="w-full bg-neutral-900 border border-neutral-800 text-white px-4 py-2.5 rounded-lg focus:outline-none focus:border-neutral-600 transition" />
                    <p th:if="${#fields.hasErrors('displayName')}" th:errors="*{displayName}"
                        class="text-red-400 text-sm mt-1"></p>
                </div>

                <div>
                    <label class="block text-sm text-neutral-400 mb-1.5">Email</label>
                    <input type="email" th:field="*{email}"
                        class="w-full bg-neutral-900 border border-neutral-800 text-white px-4 py-2.5 rounded-lg focus:outline-none focus:border-neutral-600 transition" />
                    <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-red-400 text-sm mt-1"></p>
                </div>

                <div>
                    <label class="block text-sm text-neutral-400 mb-1.5">Password</label>
                    <input type="password" th:field="*{password}"
                        class="w-full bg-neutral-900 border border-neutral-800 text-white px-4 py-2.5 rounded-lg focus:outline-none focus:border-neutral-600 transition" />
                    <p th:if="${#fields.hasErrors('password')}" th:errors="*{password}"
                        class="text-red-400 text-sm mt-1"></p>
                </div>

                <div>
                    <label class="block text-sm text-neutral-400 mb-1.5">Date of birth</label>
                    <input type="date" th:field="*{dateOfBirth}"
                        class="w-full bg-neutral-900 border border-neutral-800 text-white px-4 py-2.5 rounded-lg focus:outline-none focus:border-neutral-600 transition" />
                    <p th:if="${#fields.hasErrors('dateOfBirth')}" th:errors="*{dateOfBirth}"
                        class="text-red-400 text-sm mt-1"></p>
                </div>

                <div>
                    <label class="block text-sm text-neutral-400 mb-1.5">Skill level</label>
                    <select th:field="*{skillBadge}"
                        class="w-full bg-neutral-900 border border-neutral-800 text-white px-4 py-2.5 rounded-lg focus:outline-none focus:border-neutral-600 transition">
                        <option value="">— Select —</option>
                        <option th:each="b : ${skillBadges}" th:value="${b}" th:text="${b}"></option>
                    </select>
                    <p th:if="${#fields.hasErrors('skillBadge')}" th:errors="*{skillBadge}"
                        class="text-red-400 text-sm mt-1"></p>
                </div>

                <button type="submit"
                    class="w-full bg-white text-black px-6 py-3 rounded-full font-medium hover:bg-neutral-200 transition">
                    Sign up
                </button>
            </form>
        </div>
    </section>
</body>

</html>
