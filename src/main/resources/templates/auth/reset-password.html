<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:replace="~{layout :: base(title='Reset password', content=~{::section})}">

<body>
    <section>

        <img src="/images/guitar-bg.jpg" alt="" class="fixed inset-0 w-full h-full object-cover -z-10"
            style="object-position: 60% center;" />
        <div class="fixed inset-0 -z-10
                bg-gradient-to-l from-neutral-950 via-neutral-950/80 to-transparent"></div>

        <div class="min-h-[70vh] flex items-center md:justify-end">
            <div class="max-w-sm w-full">
                <h2 class="text-3xl font-semibold tracking-tight mb-2">Set a new password</h2>
                <p class="text-neutral-400 mb-8">
                    Pick something at least 8 characters long.
                </p>

                <form th:action="@{/reset-password}" method="post" class="space-y-5">
                    <input type="hidden" name="token" th:value="${token}" />

                    <div>
                        <label class="block text-sm text-neutral-400 mb-1.5">New password</label>
                        <input type="password" name="password" required minlength="8"
                            class="w-full bg-neutral-900/80 backdrop-blur-sm border border-neutral-800 text-white px-4 py-2.5 rounded-lg focus:outline-none focus:border-neutral-600 transition" />
                    </div>

                    <button type="submit"
                        class="w-full bg-white text-black px-6 py-3 rounded-full font-medium hover:bg-neutral-200 transition">
                        Update password
                    </button>

                    <div class="text-center">
                        <a th:href="@{/login}" class="text-sm text-neutral-400 hover:text-white transition">
                            &larr; Back to log in
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </section>
</body>

</html>
