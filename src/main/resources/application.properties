spring.application.name=musicrew

# ============================================================
# Database — H2 in file-based mode (persists between restarts)
# ============================================================
spring.datasource.url=jdbc:h2:file:./data/musicrew;AUTO_SERVER=TRUE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 web console at http://localhost:8080/h2-console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ============================================================
# JPA / Hibernate
# ============================================================
# "update" = Hibernate auto-creates/alters tables from @Entity classes.
# Fine for dev; prod uses Flyway migrations.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Run data.sql AFTER Hibernate creates tables (default order is reversed)
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=always

# ============================================================
# File uploads (profile pictures)
# ============================================================
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=6MB
musicrew.upload.dir=./uploads
